port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: false
mode: rule
log-level: silent
allow-lan: true
external-controller: 0.0.0.0:9090
secret: ""
bind-address: "*"
unified-delay: true
profile:
  store-selected: true
dns:
  enable: true
  ipv6: false
  enhanced-mode: redir-host
  listen: 0.0.0.0:7874
  nameserver:
    - 8.8.8.8
    - 1.0.0.1
    - https://dns.google/dns-query
  fallback:
    - 1.1.1.1
    - 8.8.4.4
    - https://cloudflare-dns.com/dns-query
    - 112.215.203.254
  default-nameserver:
    - 8.8.8.8
    - 1.1.1.1
    - 112.215.203.254
proxies:
- name: (ID) PUSATMEDIA 🇮🇩
  server: 104.17.3.81
  port: 443
  type: vless
  uuid: 729693f3-3aeb-4d80-9b2e-ae34e1b273b1
  cipher: none
  tls: true
  skip-cert-verify: true
  network: ws
  servername: cyylr.eu.cc
  ws-opts:
    path: /id-pusat
    headers:
      Host: cyylr.eu.cc
  udp: true
- name: (ID) PT. Telekomunikasi Indonesia 🇮🇩
  type: vmess
  server: 104.17.3.81
  port: 443
  uuid: 88888888-8888-4888-8888-888888888888
  alterId: 0
  cipher: zero
  tls: true
  skip-cert-verify: true
  servername: cyylr.eu.cc
  network: ws
  ws-opts:
    path: /id-tksi
    headers:
      Host: cyylr.eu.cc
  udp: true
- name: (ID) Amazon.com, Inc. 🇮🇩
  server: 104.17.3.81
  port: 443
  type: vless
  uuid: 7bfe7ef1-898b-42e9-a406-d3442d3931b3
  cipher: none
  tls: true
  skip-cert-verify: true
  network: ws
  servername: cyylr.eu.cc
  ws-opts:
    path: /id-amz
    headers:
      Host: cyylr.eu.cc
  udp: true

proxy-groups:
  - name: ID-X
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - (ID) PUSATMEDIA 🇮🇩
      - (ID) PT. Telekomunikasi Indonesia 🇮🇩
      - (ID) Amazon.com, Inc. 🇮🇩

  - name: MIX-X
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - (ID) PUSATMEDIA 🇮🇩
      - (ID) PT. Telekomunikasi Indonesia 🇮🇩
      - (ID) Amazon.com, Inc. 🇮🇩
      
  - name: IKLAN
    type: select
    proxies:
     - MIX-X
     - REJECT

  - name: GAME
    type: select
    proxies:
     - ID-X
     - DIRECT
     - REJECT

rules:
 - IP-CIDR,198.18.0.1/16,REJECT,no-resolve
 - RULE-SET,Block,IKLAN
 - RULE-SET,Game,GAME
 - RULE-SET,Umum,MIX-X
 - RULE-SET,indo,ID-X
 - RULE-SET,Sosmed,MIX-X
 - RULE-SET,Streaming,MIX-X
 - RULE-SET,Bankid,ID-X
 - RULE-SET,Tiktok,MIX-X
 - RULE-SET,Meta,MIX-X
 - RULE-SET,PortGame,GAME
 - MATCH,MIX-X


rule-providers:
  Game:
    type: file
    behavior: classical
    path: ./game.yaml 
  PortGame:
    type: file
    behavior: classical
    path: ./portgame.yaml
  Umum:
    type: file
    behavior: classical
    path: ./umum.yaml 
  indo:
    type: file
    behavior: classical
    path: ./indo.yaml
  Sosmed:
    type: file
    behavior: classical
    path: ./sosmed.yaml
  Streaming:
    type: file
    behavior: classical
    path: ./streaming.yaml
  Bankid:
    type: file
    behavior: domain
    path: ./bankid.yaml
  Tiktok:
    type: file
    behavior: domain
    path: ./tiktok.yaml
  Meta:
    type: file
    behavior: domain
    path: ./meta.yaml
  Block:
    type: file
    behavior: domain
    path: ./block.yaml  
